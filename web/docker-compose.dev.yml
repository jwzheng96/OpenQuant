# Phase 0 dev compose — Postgres only.
# Backend (uvicorn) and frontend (vite) run on the host for fast reload.
#
# Usage:
#   cd web
#   docker compose -f docker-compose.dev.yml up -d
#   # in another terminal, from project root:
#   uvicorn web.backend.app.main:app --reload --port 8000
#   # and:
#   cd web/frontend && pnpm install && pnpm dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: openquant-postgres-dev
    environment:
      POSTGRES_DB: openquant
      POSTGRES_USER: openquant
      POSTGRES_PASSWORD: openquant      # dev only — override via .env in prod
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5433:5432"                     # 5433 host → avoid collision w/ system pg
    volumes:
      - openquant_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openquant -d openquant"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  openquant_pgdata_dev:
