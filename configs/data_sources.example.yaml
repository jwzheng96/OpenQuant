# 数据源配置 — 复制为 data_sources.yaml 并填入真实 token
tushare:
  token: "REPLACE_WITH_YOUR_TOKEN"
  rate_limit_per_minute: 500   # 取决于积分等级
  retry:
    attempts: 5
    backoff_seconds: 2

akshare:
  rate_limit_per_minute: 200
  # akshare 没有 token，仅用于 wencai/em 等

# LLM provider for agent-based qualitative overlay
# Get your key at https://platform.deepseek.com/
deepseek:
  api_key: "REPLACE_WITH_YOUR_DEEPSEEK_KEY"
  model: "deepseek-chat"      # deepseek-chat | deepseek-reasoner | deepseek-v4-flash
  base_url: "https://api.deepseek.com/v1"
  temperature: 0.3
  max_tokens: 1200
  timeout: 60.0

storage:
  parquet_root: "./data/parquet"
  duckdb_path: "./data/open_quant.duckdb"
  clickhouse:
    host: "localhost"
    port: 8123
    database: "open_quant"
    user: "open_quant"
    password: "open_quant"
  postgres:
    dsn: "postgresql://open_quant:open_quant@localhost:5432/open_quant"

datasets:
  daily:                       # 日线
    source: tushare
    incremental: true
  daily_basic:                 # 估值指标
    source: tushare
  adj_factor:                  # 复权因子
    source: tushare
  income / balance_sheet / cashflow:
    source: tushare
  moneyflow_hsgt:              # 北向
    source: tushare
  top_list:                    # 龙虎榜
    source: tushare
  minute_1m:                   # 分钟K
    source: tushare            # 需要 Pro 高级权限
    store: clickhouse
