name: mf_ml_2025
version: "2.0"
type: multi_factor
enabled: false

# 纯 ml_lgb 信号，仅 2025-2026 OOS
# ml_lgb 训练用 2023-06..2024-XX rolling，所以 2025+ 完全是 walk-forward 之外的 OOS
factors:
  - name: ml_lgb
    weight: 1.0
    direction: 1

neutralize:
  enabled: false

selection:
  top_n: 30                 # 574 universe → top 30 ≈ 5%
  long_only: true

rebalance:
  frequency: "W-FRI"
  fill_at: "next_open"

risk_overrides:
  max_position_weight: 0.05

backtest:
  start: "2025-01-02"
  end: "2026-05-25"
  initial_cash: 1_000_000
  benchmark: "000300.SH"
