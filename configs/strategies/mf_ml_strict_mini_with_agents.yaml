name: mf_ml_strict_mini_with_agents
version: "1.0"
type: multi_factor
enabled: false

factors:
  - name: ml_lgb_strict
    weight: 1.0
    direction: 1

neutralize:
  enabled: false

selection:
  top_n: 10
  long_only: true

rebalance:
  frequency: "W-FRI"
  fill_at: "next_open"

risk_overrides:
  max_position_weight: 0.10

qualitative_overlay:
  enabled: true
  agents:
    fundamentals: true
    news: true
    technical: true
    sentiment: false
  llm:
    provider: deepseek
  decision:
    mode: filter
    veto_threshold: 0.85          # ↑ 提高门槛：只有"高度确信卖"才强制 DROP
  pre_filter:
    only_risky: true               # ← 新增：跳过蓝筹，省 LLM 钱
    risky_boards: [chinext, star, bse, unknown]
    min_market_cap_yi: 100          # 100亿以下视为小市值（风险高）
    max_return_20d: 0.30            # 20日涨跌超 30% 视为异常
    max_pe_ttm: 80
    max_pb: 10
    st_always_risky: true
  cache:
    dir: data/agents_cache
    ttl_days: 7
  toolkit:
    kind: hybrid
  max_workers: 3

backtest:
  initial_cash: 1_000_000
  benchmark: "000300.SH"
