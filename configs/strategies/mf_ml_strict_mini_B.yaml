name: mf_ml_strict_mini_B
version: "1.0"
type: multi_factor
enabled: false

# B 方案: 关闭 technical agent — ml_lgb 已经吃透量价，LLM 别重复判
# 只用 fundamentals + news 这两个 ml_lgb 看不到的信号
factors:
  - name: ml_lgb_strict
    weight: 1.0
    direction: 1

neutralize:
  enabled: false

selection:
  top_n: 10
  long_only: true

rebalance:
  frequency: "W-FRI"
  fill_at: "next_open"

risk_overrides:
  max_position_weight: 0.10

qualitative_overlay:
  enabled: true
  agents:
    fundamentals: true
    news: true
    technical: false           # ← B 方案: 关掉技术分析师
    sentiment: false
  llm:
    provider: deepseek
  decision:
    mode: filter
    veto_threshold: 0.85
  pre_filter:
    only_risky: true
    risky_boards: [chinext, star, bse, unknown]
    min_market_cap_yi: 100
    max_return_20d: 0.30
    max_pe_ttm: 80
    max_pb: 10
    st_always_risky: true
  cache:
    dir: data/agents_cache
    ttl_days: 7
  toolkit:
    kind: hybrid
  max_workers: 3

backtest:
  initial_cash: 1_000_000
  benchmark: "000300.SH"
